
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/global.css">
    <title></title>
</head>
<body>

    <style>
        body{
            padding: 0px;
            margin: 0px;
        }
        .splash-screen-art{
            position: absolute;
            left: 0px; 
            top: 0px;
            width: 100%;
            z-index: 1;
            image-rendering: optimizeQuality;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-drag: none;
        }

        #splash-progress{
            position: absolute;
            bottom: 0px;
            left: 0px;
            width: 0px;
            height: 4px;
            background: var(--color-b);
            z-index: 10; 
            box-sizing: border-box;
            animation: LoadbarAnimation 10s linear both;
        }

            @keyframes LoadbarAnimation {  
                1%{
                    width: 10%;
                }
                10%{
                    width: 15%;
                }
                15%{
                    width: 17%;
                }
                20%{
                    width: 25%;
                }
                25%{
                    width: 30%;
                }
                30%{
                    width: 32%;
                }
                50%{
                    width: 45%;
                }
                55%{
                    width: 50%; 
                }
                70%{
                    width: 60%;
                }
                85%{
                    width: 80%;
                }
                95%{
                    width: 81%;
                }
                100%{
                    width: 93%;
                }
            }

            .splash-copyright-container{
                position: absolute;
                left: 20px;
                bottom: 20px;
                display: flex;
                justify-content: center;
                align-items: left;
                flex-direction: column;
                width: auto;
                height: auto;
            }

            .splash-copyright-text{
                position: relative;
                font-family: arial;
                font-size: 9px;
                font-weight: initial;
                color: #858585;
                z-index: 10;
                user-select: none;
                -webkit-user-drag: none;
                text-rendering: geometricPrecision;
            }

            .splash-version-text{
                position: absolute;
                font-family: arial;
                font-size: 9px;
                font-weight: initial;
                color: #ffffff;
                z-index: 10;
                user-select: none;
                -webkit-user-drag: none;
                right: 20px;
                bottom: 20px;
                text-align: right;
            }

    </style>

    <img class="splash-screen-art" src="../asset/splash-screen/lovium-studio-desktop-splash-screen.svg"/>
    <div id="splash-progress"></div>
    <div class="splash-copyright-container">
        <span class="splash-copyright-text">Lovium Studio & Community</span> 
        <span class="splash-copyright-text splash-copyright-label">&copy; 2026 &bull; 2026</span>
    </div>

    <span class="splash-version-text">V. 0.1.3 PREVIEW</span>

</body>
</html>
